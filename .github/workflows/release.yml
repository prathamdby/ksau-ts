name: Build, Tag, and Release Application

# Required GitHub secrets:
#   PRIVATE_GPG_KEY          — raw PEM content of the OpenPGP private key
#   PRIVATE_PGP_KEY_PASSPHRASE — passphrase for the key above

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install Dependencies
        run: bun install

      - name: Set build metadata
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Build for GitHub Actions
        env:
          PRIVATE_GPG_KEY: ${{ secrets.PRIVATE_GPG_KEY }}
          PRIVATE_PGP_KEY_PASSPHRASE: ${{ secrets.PRIVATE_PGP_KEY_PASSPHRASE }}
          VERSION: ${{ env.VERSION }}
          COMMIT: ${{ env.COMMIT }}
          DATE: ${{ env.DATE }}
        run: |
          set -e
          if [ -z "$PRIVATE_GPG_KEY" ]; then
            echo "Error: PRIVATE_GPG_KEY is empty or not set."
            exit 1
          fi
          if [ -z "$PRIVATE_PGP_KEY_PASSPHRASE" ]; then
            echo "Error: PRIVATE_PGP_KEY_PASSPHRASE is empty or not set."
            exit 1
          fi

          echo "$PRIVATE_GPG_KEY" > src/crypto/privkey.pem
          printf '%s' "$PRIVATE_PGP_KEY_PASSPHRASE" > src/crypto/passphrase.txt

          make build_gh_actions

          rm -f src/crypto/privkey.pem src/crypto/passphrase.txt

      - name: Verify build outputs
        run: |
          for f in ksau-ts-linux-x64 ksau-ts-linux-arm64 ksau-ts-windows-x64.exe ksau-ts-darwin-x64 ksau-ts-darwin-arm64; do
            test -f "$f" && test -s "$f" || { echo "Missing or empty: $f"; exit 1; }
          done

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ env.VERSION }}
          body: |
            Release ${{ env.VERSION }} (commit ${{ env.COMMIT }}, built ${{ env.DATE }})
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
          files: |
            ksau-ts-linux-x64
            ksau-ts-linux-arm64
            ksau-ts-windows-x64.exe
            ksau-ts-darwin-x64
            ksau-ts-darwin-arm64
